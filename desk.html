<!DOCTYPE html>
<html>
<head>
    <title>Desk</title>
    <link href="style.css" rel="stylesheet">
</head>        
<body class="desk-page">
<div class="desk-title"> 
    <a href="./index.html"></a>
</div> 
<div class="desk-area">
 <div class="desk-widget-right"> 
  <div class="pixel-timer">   
  <h1 class="timer" id="timer">20:00</h1>
  <div class="button-wrapper">
  <button id="start">></button>
  <button id="stop">x</button>
  <button id="reset">=</button>
  </div>
</div>
</div>
<div class="desk-center">
  <button onclick="savebtn()" class="savebtn"></button>
  <textarea class= "desk-textbox" placeholder="You got this!"></textarea>
  
</div>
 <div class="desk-widget-left">
   <button onclick="saveText()" class ="savebtn"></button>
  <div class="orange-note" contenteditable="true"></div>
  <div class="green-note" contenteditable="true"></div>
  <div class="blue-note" contenteditable="true"></div>
  <div class="yellow-note" contenteditable="true"></div>
  <button onclick="saveText()" class ="savebtn"></button>
  
 </div>
</div> 
</body>  
<script defer src="script.js"></script>  
</html>
